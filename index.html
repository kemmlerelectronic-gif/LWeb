<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyB3OGNPAZ6NYgttFD4r6h_OLvzeWfGuzzE",
authDomain: "lisy-system.firebaseapp.com",
databaseURL: "https://lisy-system-default-rtdb.firebaseio.com",
projectId: "lisy-system",
storageBucket: "lisy-system.firebasestorage.app",
messagingSenderId: "891198478531",
appId: "1:891198478531:web:8d001502bf14ff7739aa76"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const LIS_COUNT = 7

let lisy=[]
let pozadavky=[]

function emptyLis(){
return {kontakt:"",prurez:"",jmeno:""}
}

function render(){
renderLisy()
renderQueue()
renderProduction()
renderProductionQueue()
}

function saveLisy(){
set(ref(db,"lisy"),lisy)
}

function assign(req,lis){

lisy[lis]={...pozadavky[req]}

pozadavky.splice(req,1)

saveLisy()

set(ref(db,"pozadavky"),pozadavky)

blinkLis(lis)
updateHeader(lis)

}

function addRequest(){

const kontakt=document.getElementById("kontakt").value
const prurez=document.getElementById("prurez").value
const jmeno=document.getElementById("jmeno").value

if(!kontakt) return

push(ref(db,"pozadavky"),{
kontakt,
prurez,
jmeno,
time:Date.now()
})

document.getElementById("kontakt").value=""
document.getElementById("prurez").value=""
document.getElementById("jmeno").value=""

}

function clearLis(i){

lisy[i]=emptyLis()

saveLisy()

}

function updateHeader(i){

const h=document.getElementById("mainHeader")
const d=lisy[i]

h.innerText=`${d.kontakt} - ${d.prurez} - ${d.jmeno} - LIS ${i+1}`

h.classList.add("blink")

setTimeout(()=>h.classList.remove("blink"),10000)

}

function blinkLis(i){

const c=document.getElementById("lis"+i)
const p=document.getElementById("prodLis"+i)

if(c) c.classList.add("blink")
if(p) p.classList.add("blink")

playTone()

setTimeout(()=>{

if(c) c.classList.remove("blink")
if(p) p.classList.remove("blink")

},10000)

}

function playTone(){

const ctx=new(window.AudioContext||window.webkitAudioContext)()

function note(f,t,d){

const o=ctx.createOscillator()
const g=ctx.createGain()

o.frequency.value=f
o.connect(g)
g.connect(ctx.destination)

o.start(t)
o.stop(t+d)

}

let t=ctx.currentTime

note(1000,t,0.2)
note(700,t+0.3,0.3)

setTimeout(()=>ctx.close(),1000)

}

function setupMode(){

document.getElementById("setupScreen").style.display="block"
document.getElementById("productionScreen").style.display="none"
document.getElementById("setupTopbar").style.display="block"

}

function productionMode(){

document.getElementById("setupScreen").style.display="none"
document.getElementById("productionScreen").style.display="block"
document.getElementById("setupTopbar").style.display="none"

}

onValue(ref(db,"lisy"),(snapshot)=>{

const data=snapshot.val()

if(data){
lisy=data
}else{
lisy=Array.from({length:LIS_COUNT},()=>emptyLis())
saveLisy()
}

render()

})

onValue(ref(db,"pozadavky"),(snapshot)=>{

pozadavky=[]

snapshot.forEach((item)=>{

pozadavky.push(item.val())

})

render()

})

</script>
